  "solana_kit_rpc_spec",
  "solana_kit_rpc_spec_types",
  "solana_kit_rpc_subscriptions",
  "solana_kit_rpc_subscriptions_api",
  "solana_kit_rpc_subscriptions_channel_websocket",
  "solana_kit_rpc_transformers",
