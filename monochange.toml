release = true
version_format = "primary"
changelog = { path = "CHANGELOG.md" }

[lints.rules]
"dart/internal-path-dependency-policy" = "off"
"changesets/duplicate" = "error"
"changesets/no_section_headings" = "error"
"changesets/summary" = { level = "error", required = true, heading_level = 1, min_length = 8, max_length = 90, forbid_trailing_period = true, forbid_conventional_commit_prefix = true }
"changesets/bump/major" = { level = "error", min_body_chars = 120, require_code_block = true }
"changesets/types/breaking" = { level = "error", required_bump = "major", forbidden_headings = ["Breaking", "Breaking change", "Breaking changes"] }
"changesets/types/major" = { level = "error", required_bump = "major", forbidden_headings = ["Major", "Breaking", "Breaking change", "Breaking changes"] }
"changesets/types/feat" = { level = "error", required_bump = "minor", forbidden_headings = ["Feat", "Feature"] }
"changesets/types/fix" = { level = "error", required_bump = "patch", forbidden_headings = ["Fix", "Fixed"] }

[ecosystems.dart]
enabled = true
publish.enabled = true
publish.mode = "external"
publish.registry = "pub_dev"
versioned_files = [
  { path = "**/pubspec.yaml", type = "dart", fields = ["dependencies", "dev_dependencies"] },
]

[ecosystems.npm]
enabled = true
roots = ["packages/codama-renderers-dart"]
publish.enabled = true
publish.mode = "external"
publish.registry = "npm"

[source]
provider = "github"
owner = "openbudgetfun"
repo = "solana_kit"

[source.releases]
enabled = true
source = "monochange"
branches = ["main"]
enforce_for_tags = true
enforce_for_publish = true
enforce_for_commit = false

[source.pull_requests]
enabled = true
branch_prefix = "monochange/release"
base = "main"
title = "chore(release): prepare release"
labels = ["release", "automated"]
auto_merge = false

[changesets.affected]
enabled = true
required = true
skip_labels = []
comment_on_failure = true
changed_paths = []
ignored_paths = []

[cli.document]
help_text = "Create a changeset file and format workspace files"
steps = [
  { type = "CreateChangeFile", name = "create changeset" },
  { type = "Command", name = "format with dprint", command = "dprint fmt --config dprint.json" },
]

[cli.release-pr]
help_text = "Prepare release changes and open or update the monochange release PR"
inputs = [
  { name = "format", type = "choice", choices = ["text", "json", "markdown"], default = "markdown" },
  { name = "no_verify", type = "boolean", default = true },
]
steps = [
  { type = "PrepareRelease", name = "plan release", allow_empty_changesets = true, inputs = ["format"] },
  { type = "OpenReleaseRequest", name = "open release PR", when = "{{ number_of_changesets > 0 }}", inputs = { format = "markdown", no_verify = "{{ inputs.no_verify }}", stage_all = true } },
]

[cli.release]
help_text = "Prepare a local release: plan bumps, sync files, format, optionally commit, tag, and publish the GitHub release"
inputs = [
  { name = "format", type = "choice", choices = ["text", "json", "markdown"], default = "markdown" },
  { name = "no_verify", type = "boolean", default = true },
  { name = "commit", help_text = "Whether to commit the release changes", type = "boolean", default = false },
  { name = "push", help_text = "Whether to push the release after the commit", type = "boolean", default = false },
  { name = "tag", help_text = "Whether to create and push release tags from the release commit", type = "boolean", default = false },
  { name = "publish_release", help_text = "Whether to publish the GitHub release object for the release tag", type = "boolean", default = false },
]
steps = [
  { type = "PrepareRelease", name = "plan release", allow_empty_changesets = true },
  { type = "Command", name = "format with dprint", when = "{{ number_of_changesets > 0 }}", command = "dprint fmt --config dprint.json" },
  { type = "Command", name = "update flutter lockfiles", when = "{{ number_of_changesets > 0 }}", command = "flutter pub get" },
  { type = "Command", name = "generate pnpm lockfile", when = "{{ number_of_changesets > 0 }}", command = "pnpm install --lockfile-only --no-frozen-lockfile --link-workspace-packages" },
  { type = "CommitRelease", name = "create release commit", when = "{{ number_of_changesets > 0 && inputs.commit }}", inputs = { no_verify = "{{ inputs.no_verify }}", stage_all = true } },
  { type = "Command", name = "push release commit", when = "{{ number_of_changesets > 0 && inputs.commit && inputs.push}}", command = "git push" },
  { type = "TagRelease", name = "create and push release tags", when = "{{ number_of_changesets > 0 && inputs.commit && inputs.tag }}", inputs = { from = "HEAD", push = true, format = "json" } },
  { type = "PublishRelease", name = "publish GitHub release", when = "{{ number_of_changesets > 0 && inputs.commit && inputs.tag && inputs.publish_release }}", inputs = { from-ref = "HEAD", draft = false, format = "json" } },
]

[cli.publish]
help_text = "Publish packages to registries (Dart via melos, NPM via pnpm). Must be run from a tagged release commit."
steps = [
  { type = "Command", name = "publish Dart packages", command = "melos publish --no-dry-run --yes", dry_run_command = "melos publish --dry-run --yes" },
  { type = "Command", name = "publish NPM renderer", command = "pnpm --filter codama-renderers-dart publish --access public --no-git-checks", dry_run_command = "pnpm --filter codama-renderers-dart publish --dry-run --access public --no-git-checks" },
]
