version: 0.2.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  meta: ^1.16.0
  solana_kit_codecs_core:
    workspace: true
  solana_kit_codecs_numbers:
    workspace: true
  solana_kit_errors:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
