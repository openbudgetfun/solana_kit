name: solana_kit_rpc_api
description: RPC method type definitions for the Solana Kit Dart SDK.
version: 0.1.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  solana_kit_addresses:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_keys:
    workspace: true
  solana_kit_rpc_parsed_types:
    workspace: true
  solana_kit_rpc_spec:
    workspace: true
  solana_kit_rpc_spec_types:
    workspace: true
  solana_kit_rpc_transformers:
    workspace: true
  solana_kit_rpc_types:
    workspace: true
  solana_kit_transaction_messages:
    workspace: true
  solana_kit_transactions:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
