group = "com.solana.solanakit.mobilewallet"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "1.9.22"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.2.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.solana.solanakit.mobilewallet"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        minSdk = 23
    }
}

dependencies {
    implementation("com.solanamobile:mobile-wallet-adapter-clientlib:2.1.0")
    implementation("com.solanamobile:mobile-wallet-adapter-walletlib:2.0.2")
    implementation("com.solanamobile:digital-asset-links-android:1.0.3")
}
