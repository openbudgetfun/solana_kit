  solana_kit_addresses: ^0.5.0
  solana_kit_associated_token_account: ^0.5.0
  solana_kit_codecs_core: ^0.5.0
  solana_kit_codecs_data_structures: ^0.5.0
  solana_kit_codecs_numbers: ^0.5.0
  solana_kit_codecs_strings: ^0.5.0
  solana_kit_errors: ^0.5.0
  solana_kit_instructions: ^0.5.0

dev_dependencies:
