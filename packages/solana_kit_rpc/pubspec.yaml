name: solana_kit_rpc
description: Primary RPC client for the Solana Kit Dart SDK.
version: 0.2.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  http: ^1.4.0
  solana_kit_errors:
    workspace: true
  solana_kit_fast_stable_stringify:
    workspace: true
  solana_kit_rpc_api:
    workspace: true
  solana_kit_rpc_spec:
    workspace: true
  solana_kit_rpc_spec_types:
    workspace: true
  solana_kit_rpc_transformers:
    workspace: true
  solana_kit_rpc_transport_http:
    workspace: true
  solana_kit_rpc_types:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
