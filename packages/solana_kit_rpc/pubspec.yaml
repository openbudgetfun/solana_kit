  solana_kit_fast_stable_stringify: ^0.3.1
  solana_kit_keys: ^0.3.1
  solana_kit_rpc_api: ^0.3.1
  solana_kit_rpc_spec: ^0.3.1
  solana_kit_rpc_spec_types: ^0.3.1
  solana_kit_rpc_transformers: ^0.3.1
  solana_kit_rpc_transport_http: ^0.3.1
  solana_kit_rpc_types: ^0.3.1
dev_dependencies:
  solana_kit_lints: ^0.3.1
  test: ^1.25.0
