name: solana_kit_accounts
description: Account fetching and decoding for the Solana Kit Dart SDK.
version: 0.1.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  meta: ^1.16.0
  solana_kit_addresses:
    workspace: true
  solana_kit_codecs_core:
    workspace: true
  solana_kit_codecs_strings:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_rpc_spec:
    workspace: true
  solana_kit_rpc_types:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
