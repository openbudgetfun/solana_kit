name: solana_kit_program_client_core
description: Program client core for the Solana Kit Dart SDK.
version: 0.1.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  solana_kit_accounts:
    workspace: true
  solana_kit_addresses:
    workspace: true
  solana_kit_codecs_core:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_instructions:
    workspace: true
  solana_kit_rpc_spec:
    workspace: true
  solana_kit_rpc_types:
    workspace: true
  solana_kit_signers:
    workspace: true

dev_dependencies:
  solana_kit_keys:
    workspace: true
  solana_kit_lints:
    workspace: true
  solana_kit_transactions:
    workspace: true
  test: ^1.25.0
