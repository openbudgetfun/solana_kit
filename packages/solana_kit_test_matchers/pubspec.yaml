    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_keys:
    workspace: true
  solana_kit_transactions:
    workspace: true
  test: ^1.25.0

dev_dependencies:
  solana_kit_lints:
    workspace: true
