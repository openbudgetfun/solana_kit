name: solana_kit_token_2022
description: SPL Token 2022 and Associated Token Account client for the Solana Kit Dart SDK. Generated from the upstream Codama IDL with focused ergonomic helpers.
version: 0.4.0
repository: https://github.com/openbudgetfun/solana_kit
homepage: https://openbudgetfun.github.io/solana_kit/

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  meta: ^1.16.0
  solana_kit_accounts: ^0.4.0
  solana_kit_addresses: ^0.4.0
  solana_kit_associated_token_account: ^0.4.0
  solana_kit_codecs_core: ^0.4.0
  solana_kit_codecs_data_structures: ^0.4.0
  solana_kit_codecs_numbers: ^0.4.0
  solana_kit_codecs_strings: ^0.4.0
  solana_kit_errors: ^0.4.0
  solana_kit_instruction_plans: ^0.4.0
  solana_kit_instructions: ^0.4.0
  solana_kit_options: ^0.4.0
  solana_kit_signers: ^0.4.0
  solana_kit_system: ^0.3.2

dev_dependencies:
  solana_kit_lints: ^0.4.0
  solana_kit_test_matchers: ^0.4.0
  test: ^1.25.0
