name: solana_kit
description: Umbrella package re-exporting all Solana Kit Dart SDK packages.
version: 0.2.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  solana_kit_accounts:
    workspace: true
  solana_kit_addresses:
    workspace: true
  solana_kit_codecs:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_fast_stable_stringify:
    workspace: true
  solana_kit_functional:
    workspace: true
  solana_kit_instruction_plans:
    workspace: true
  solana_kit_instructions:
    workspace: true
  solana_kit_keys:
    workspace: true
  solana_kit_offchain_messages:
    workspace: true
  solana_kit_options:
    workspace: true
  solana_kit_program_client_core:
    workspace: true
  solana_kit_programs:
    workspace: true
  solana_kit_rpc:
    workspace: true
  solana_kit_rpc_parsed_types:
    workspace: true
  solana_kit_rpc_spec_types:
    workspace: true
  solana_kit_rpc_subscriptions:
    workspace: true
  solana_kit_rpc_transport_http:
    workspace: true
  solana_kit_rpc_types:
    workspace: true
  solana_kit_signers:
    workspace: true
  solana_kit_subscribable:
    workspace: true
  solana_kit_sysvars:
    workspace: true
  solana_kit_transaction_confirmation:
    workspace: true
  solana_kit_transaction_messages:
    workspace: true
  solana_kit_transactions:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
