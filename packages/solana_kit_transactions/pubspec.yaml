name: solana_kit_transactions
description: Transaction compilation and signing for the Solana Kit Dart SDK.
version: 0.1.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  meta: ^1.16.0
  solana_kit_addresses:
    workspace: true
  solana_kit_codecs_core:
    workspace: true
  solana_kit_codecs_data_structures:
    workspace: true
  solana_kit_codecs_numbers:
    workspace: true
  solana_kit_codecs_strings:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_instructions:
    workspace: true
  solana_kit_keys:
    workspace: true
  solana_kit_transaction_messages:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
