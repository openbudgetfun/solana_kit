name: solana_kit_sysvars
description: System variable access for the Solana Kit Dart SDK.
version: 0.1.0
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  meta: ^1.17.0
  solana_kit_accounts:
    workspace: true
  solana_kit_addresses:
    workspace: true
  solana_kit_codecs_core:
    workspace: true
  solana_kit_codecs_data_structures:
    workspace: true
  solana_kit_codecs_numbers:
    workspace: true
  solana_kit_errors:
    workspace: true
  solana_kit_rpc_spec:
    workspace: true
  solana_kit_rpc_types:
    workspace: true

dev_dependencies:
  solana_kit_lints:
    workspace: true
  test: ^1.25.0
