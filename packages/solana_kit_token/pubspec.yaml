name: solana_kit_token
description: SPL Token and Associated Token Account client for the Solana Kit Dart SDK. Generated from the upstream Codama IDL with handwritten ergonomic helpers.
version: 0.3.1
repository: https://github.com/openbudgetfun/solana_kit
homepage: https://openbudgetfun.github.io/solana_kit/

environment:
  sdk: ^3.10.1

resolution: workspace

dependencies:
  meta: ^1.16.0
  solana_kit_accounts: ^0.3.1
  solana_kit_addresses: ^0.3.1
  solana_kit_codecs_core: ^0.3.1
  solana_kit_codecs_data_structures: ^0.3.1
  solana_kit_codecs_numbers: ^0.3.1
  solana_kit_codecs_strings: ^0.3.1
  solana_kit_errors: ^0.3.1
  solana_kit_instruction_plans: ^0.3.1
  solana_kit_instructions: ^0.3.1
dev_dependencies:
  solana_kit_lints: ^0.3.1
  solana_kit_test_matchers: ^0.3.1
  test: ^1.25.0
