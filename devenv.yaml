# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  ifiokjr-nixpkgs:
    url: github:ifiokjr/nixpkgs
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
allowUnfree: true
