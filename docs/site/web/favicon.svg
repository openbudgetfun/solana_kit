<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Solana Kit</title>
  <desc id="desc">Layered gradient bars forming a stylized S mark inside a rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04242E" />
      <stop offset="100%" stop-color="#0A111A" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E6C3" />
      <stop offset="50%" stop-color="#2FB3FF" />
      <stop offset="100%" stop-color="#7CE0FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)" />

  <g fill="url(#brand)" filter="url(#glow)">
    <path d="M58 70h126c11 0 17 13 10 21l-20 21a15 15 0 0 1-11 5H37c-11 0-17-13-10-21l20-21a15 15 0 0 1 11-5z" />
    <path d="M93 118h126c11 0 17 13 10 21l-20 21a15 15 0 0 1-11 5H72c-11 0-17-13-10-21l20-21a15 15 0 0 1 11-5z" opacity="0.92" />
    <path d="M58 166h126c11 0 17 13 10 21l-20 21a15 15 0 0 1-11 5H37c-11 0-17-13-10-21l20-21a15 15 0 0 1 11-5z" opacity="0.84" />
  </g>
</svg>
