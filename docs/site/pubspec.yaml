name: solana_kit_docs_site
description: Solana Kit documentation site built with Jaspr Content
version: 0.0.1
publish_to: none
repository: https://github.com/openbudgetfun/solana_kit

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.1
  jaspr_content: ^0.5.0
  jaspr_router: ^0.8.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.4.13
  jaspr_builder: ^0.23.1
  jaspr_cli: ^0.23.0+3
  jaspr_lints: ^0.7.0
  lints: ^6.1.0

jaspr:
  mode: static
  port: 9080

resolution: workspace
