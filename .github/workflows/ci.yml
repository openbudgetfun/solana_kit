name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: ".github/workflows/ .github/actions/"
          advanced-security: true

  docs-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and smoke test docs site
        run: docs:site:smoke
        shell: devenv shell -- bash -e {0}

  upstream-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check tracked upstream parity metadata and behavior
        run: upstream:parity --clone-if-missing
        shell: devenv shell -- bash -e {0}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: lint all (includes ktlint and zizmor)
        run: lint:all
        shell: devenv shell -- bash -e {0}

      - name: Validate monochange configuration
        run: monochange step validate
        shell: devenv shell -- bash -e {0}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: test
        run: test:all
        shell: devenv shell -- bash -e {0}

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Start SurfPool and run integration tests
        run: test:integration
        shell: devenv shell -- bash -e {0}

  android-plugin-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          sdk-version: 34
          ndk-version: "26.0.10792818"
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true
      - name: Install Android SDK components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Verify mobile wallet adapter Android compilation
        run: dart run scripts/check_mobile_wallet_adapter_android_compile.dart

  renderer-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/codama-renderers-dart
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
      - name: test
        run: pnpm test

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: install NPM dependencies
        run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate Dart package publish metadata
        run: melos publish --dry-run --yes
        shell: devenv shell -- bash -e {0}
      - name: Build NPM renderer package
        run: pnpm --filter codama-renderers-dart build
      - name: Validate NPM renderer publish metadata
        run: pnpm --filter codama-renderers-dart publish --dry-run --no-git-checks

  coverage:
    runs-on: ubuntu-latest
    outputs:
      codecov-flags: ${{ steps.prepare-codecov-flags.outputs.flags }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: install NPM dependencies
        run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Dart coverage
        run: test:coverage
        shell: devenv shell -- bash -e {0}
      - name: NPM renderer coverage
        run: pnpm --filter codama-renderers-dart test:coverage
      - name: prepare Codecov flag reports
        id: prepare-codecov-flags
        run: dart run scripts/prepare_codecov_flags.dart --lcov coverage/lcov.info --out-dir coverage/flags --github-output "$GITHUB_OUTPUT"
        shell: devenv shell -- bash -e {0}
      - name: upload Codecov flag reports artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codecov-flag-reports
          path: coverage/flags/*.lcov
          if-no-files-found: error
          retention-days: 7
      - name: upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage/lcov.info,./packages/codama-renderers-dart/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          name: solana-kit-workspace
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          verbose: true

  coverage-flags:
    runs-on: ubuntu-latest
    needs: coverage
    if: ${{ needs.coverage.outputs.codecov-flags != '[]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        flag: ${{ fromJson(needs.coverage.outputs.codecov-flags) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: download Codecov flag reports artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: codecov-flag-reports
          path: coverage/flags
      - name: upload package coverage flag to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage/flags/${{ matrix.flag }}.lcov
          disable_search: true
          fail_ci_if_error: true
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          verbose: true
