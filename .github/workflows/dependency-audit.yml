name: Dependency Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit-pr:
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      # PR diff scanning is limited to tracked lockfiles committed to the repo.
      scan-args: |-
        -L
        pnpm-lock.yaml
        -L
        packages/codama-renderers-dart/pnpm-lock.yaml
      fail-on-vuln: true
      upload-sarif: true

  dependency-audit-baseline:
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      # Scheduled/manual scanning is limited to tracked lockfiles committed to the repo.
      scan-args: |-
        -L
        pnpm-lock.yaml
        -L
        packages/codama-renderers-dart/pnpm-lock.yaml
      # Do not break scheduled/manual audits on already-known advisories.
      fail-on-vuln: false
      upload-sarif: true
