name: changeset-policy

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: changeset-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: collect changed files
        id: changed
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46

      - name: reject group-targeted changesets
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          set -euo pipefail

          changesets=()
          for path in $CHANGED_FILES; do
            if [[ "$path" == .changeset/*.md ]]; then
              changesets+=("$path")
            fi
          done

          if (( ${#changesets[@]} > 0 )); then
            dart run scripts/check_changeset_package_targets.dart "${changesets[@]}"
          else
            echo "No changed changeset files to validate."
          fi
        shell: devenv shell -- bash -e {0}

      - name: check changeset policy
        uses: monochange/actions/changeset-policy@a80339fb79c09059383469608d98b75577fe18a1 # v0.8.0
        with:
          setup-monochange: devenv shell monochange
          changed-paths: ${{ steps.changed.outputs.all_changed_files }}
          labels: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
