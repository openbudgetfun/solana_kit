name: Docs Pages

on:
  workflow_dispatch:
    inputs:
      base_path:
        description: Optional base path override for GitHub Pages (for example /solana_kit/)
        required: false
        default: ""
        type: string
  # GitHub Pages environment deployment is restricted to the `main` branch,
  # so release-tag runs cannot complete the deploy job.
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve docs base path
        id: base
        env:
          INPUT_BASE_PATH: ${{ inputs.base_path }}
        run: |
          input_base="$INPUT_BASE_PATH"

          if [[ -n "$input_base" ]]; then
            base_path="$input_base"
          elif [[ "${GITHUB_REPOSITORY#*/}" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            base_path='/'
          else
            base_path='/${GITHUB_REPOSITORY#*/}/'
          fi

          if [[ "$base_path" != "/" ]]; then
            [[ "$base_path" != /* ]] && base_path="/$base_path"
            [[ "$base_path" != */ ]] && base_path="$base_path/"
          fi

          echo "base_path=$base_path" >> "$GITHUB_OUTPUT"
          echo "Using DOCS_BASE_PATH=$base_path"
      - name: Build docs site
        env:
          DOCS_BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: docs:site:build --dart-define=DOCS_BASE_PATH="$DOCS_BASE_PATH"
        shell: devenv shell -- bash -e {0}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docs/site/build/jaspr

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
