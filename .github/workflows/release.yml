name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: create or update release PR
        run: dart run scripts/open_release_pr.dart
        shell: devenv shell -- bash -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: detect exact monochange release commit
        id: release-record
        run: |
          set +e
          mc step:release-record --from HEAD --format json > release-record.json
          status=$?
          cat release-record.json

          if [ "$status" -ne 0 ]; then
            echo "exact=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          distance="$(python3 -c "import json; print(json.load(open('release-record.json'))['distance'])")"
          echo "distance=$distance" >> "$GITHUB_OUTPUT"

          if [ "$distance" = "0" ]; then
            echo "exact=true" >> "$GITHUB_OUTPUT"
          else
            echo "exact=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}
      - name: tag release commit
        if: steps.release-record.outputs.exact == 'true'
        run: mc step:tag-release --from HEAD --push=true --format json
        shell: devenv shell -- bash -e {0}
      - name: publish GitHub release notes
        if: steps.release-record.outputs.exact == 'true'
        run: mc step:publish-release --from-ref HEAD --format json
        shell: devenv shell -- bash -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
