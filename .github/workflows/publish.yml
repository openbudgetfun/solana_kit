name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.repository == 'openbudgetfun/solana_kit'
    environment: publisher
    permissions:
      actions: read
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_TAG" != v* || "$RELEASE_TAG" == */* ]]; then
            echo "::error::Tag '$RELEASE_TAG' must be a direct v* release tag, for example v0.6.0." >&2
            exit 1
          fi
        shell: bash

      - name: checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: verify tag checkout
        env:
          EXPECTED_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected_tag="$EXPECTED_TAG"
          actual_commit="$(git rev-parse HEAD)"
          tag_commit="$(git rev-list -n1 "$expected_tag")"
          if [ "$actual_commit" != "$tag_commit" ]; then
            echo "::error::Checked-out commit $actual_commit does not match tag $expected_tag ($tag_commit)." >&2
            exit 1
          fi
          git fetch --force origin main:refs/remotes/origin/main --tags
          if ! git merge-base --is-ancestor "$actual_commit" refs/remotes/origin/main; then
            echo "::error::Tag $expected_tag ($actual_commit) is not on main." >&2
            exit 1
          fi
        shell: bash

      - name: setup Dart publishing authentication
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
      # Keep registry-url unset so setup-node does not inject NODE_AUTH_TOKEN;
      # MonoChange requires token-free npm OIDC trusted publishing.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: capture action-managed Node path
        id: action_tools
        run: |
          set -euo pipefail
          node_dir="$(dirname "$(command -v node)")"
          echo "node_dir=$node_dir" >> "$GITHUB_OUTPUT"
          echo "node: $node_dir/node"
          echo "npm: $node_dir/npm"

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install NPM dependencies
        run: pnpm install --frozen-lockfile

      - name: build NPM renderer package
        run: pnpm --filter codama-renderers-dart build

      - name: check publish readiness
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          monochange step publish-readiness \
            --from HEAD \
            --output "$RUNNER_TEMP/publish-readiness.json" \
            --format json
        shell: devenv shell -- bash -e {0}

      - name: publish packages with MonoChange
        env:
          ACTION_NODE_DIR: ${{ steps.action_tools.outputs.node_dir }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          # devenv can place its own Node.js ahead of setup-node. npm trusted
          # publishing requires Node.js 22.14+ and npm 11.5.1+.
          export PATH="$ACTION_NODE_DIR:$PATH"
          hash -r
          command -v node
          command -v npm
          command -v dart
          command -v flutter
          node --version
          npm --version
          dart --version
          flutter --version
          monochange step publish-packages \
            --log-level info \
            --output "$RUNNER_TEMP/publish-result.json" \
            --format json
        shell: devenv shell -- bash -e {0}

      - name: publish GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          monochange step publish-release \
            --from-ref HEAD \
            --format json | tee "$RUNNER_TEMP/publish-release.json"
        shell: devenv shell -- bash -e {0}

      - name: upload MonoChange publish artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: monochange-publish-artifacts
          path: |
            ${{ runner.temp }}/publish-readiness.json
            ${{ runner.temp }}/publish-result.json
            ${{ runner.temp }}/publish-release.json
          if-no-files-found: ignore
          retention-days: 14
