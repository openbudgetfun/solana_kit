name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish in dry-run mode
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish-dart:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate target branch
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Non-dry-run publishes must run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Publish Dart packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            melos publish --dry-run
          else
            melos publish --no-dry-run
          fi
        shell: devenv shell -- bash -e {0}

  publish-npm:
    needs: publish-dart
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - name: Validate target branch
        if: ${{ !inputs.dry_run }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Non-dry-run publishes must run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Publish codama-renderers-dart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            pnpm --filter codama-renderers-dart publish --dry-run --provenance --access public
          else
            pnpm --filter codama-renderers-dart publish --provenance --access public
          fi
        shell: devenv shell -- bash -e {0}