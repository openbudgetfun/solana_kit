name: devenv
description: "Setup development environment with devenv"
inputs:
  github-token:
    description: Provide a github token
    required: true
  cache-version:
    description: The version of the cache to use.
    required: false
    default: "v1"

runs:
  using: composite
  steps:
    - name: cache pnpm node
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.local/share/pnpm
        key: ${{ runner.os }}-pnpm-node-${{ inputs.cache-version }}-${{ hashFiles('pnpm-workspace.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-node-${{ inputs.cache-version }}-

    - name: install nix
      uses: cachix/install-nix-action@b97f05dcb019ddea06450a50ef6203d2fdc19fee # v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: setup nix environment
      run: |
        nix profile add --accept-flake-config nixpkgs#cachix
        cachix use devenv
        nix profile add nixpkgs#devenv
      shell: bash

    - name: install flutter sdk via fvm
      run: |
        devenv shell -- bash -e <<'EOF'
        fvm install
        fvm use --force
        EOF
      shell: bash

    - name: install dependencies
      run: |
        devenv shell -- bash -e <<'EOF'
        install:all
        EOF
      shell: bash
