[github]
owner = "openbudgetfun"
repo = "solana_kit"

[changes]
ignore_conventional_commits = true

[package]
versioned_files = [
  "packages/solana_kit/pubspec.yaml",
  "packages/solana_kit/pubspec.yaml",
  "packages/solana_kit_accounts/pubspec.yaml",
  "packages/solana_kit_addresses/pubspec.yaml",
  "packages/solana_kit_codecs/pubspec.yaml",
  "packages/solana_kit_codecs_core/pubspec.yaml",
  "packages/solana_kit_codecs_data_structures/pubspec.yaml",
  "packages/solana_kit_codecs_numbers/pubspec.yaml",
  "packages/solana_kit_codecs_strings/pubspec.yaml",
  "packages/solana_kit_errors/pubspec.yaml",
  "packages/solana_kit_fast_stable_stringify/pubspec.yaml",
  "packages/solana_kit_functional/pubspec.yaml",
  "packages/solana_kit_helius/pubspec.yaml",
  "packages/solana_kit_instruction_plans/pubspec.yaml",
  "packages/solana_kit_instructions/pubspec.yaml",
  "packages/solana_kit_keys/pubspec.yaml",
  "packages/solana_kit_lints/pubspec.yaml",
  "packages/solana_kit_mobile_wallet_adapter/pubspec.yaml",
  "packages/solana_kit_mobile_wallet_adapter_protocol/pubspec.yaml",
  "packages/solana_kit_offchain_messages/pubspec.yaml",
  "packages/solana_kit_options/pubspec.yaml",
  "packages/solana_kit_program_client_core/pubspec.yaml",
  "packages/solana_kit_programs/pubspec.yaml",
  "packages/solana_kit_rpc/pubspec.yaml",
  "packages/solana_kit_rpc_api/pubspec.yaml",
  "packages/solana_kit_rpc_parsed_types/pubspec.yaml",
  "packages/solana_kit_rpc_spec/pubspec.yaml",
  "packages/solana_kit_rpc_spec_types/pubspec.yaml",
  "packages/solana_kit_rpc_subscriptions/pubspec.yaml",
  "packages/solana_kit_rpc_subscriptions_api/pubspec.yaml",
  "packages/solana_kit_rpc_subscriptions_channel_websocket/pubspec.yaml",
  "packages/solana_kit_rpc_transport_http/pubspec.yaml",
  "packages/solana_kit_rpc_transformers/pubspec.yaml",
  "packages/solana_kit_rpc_types/pubspec.yaml",
  "packages/solana_kit_signers/pubspec.yaml",
  "packages/solana_kit_subscribable/pubspec.yaml",
  "packages/solana_kit_sysvars/pubspec.yaml",
  "packages/solana_kit_test_matchers/pubspec.yaml",
  "packages/solana_kit_transaction_confirmation/pubspec.yaml",
  "packages/solana_kit_transaction_messages/pubspec.yaml",
  "packages/solana_kit_transactions/pubspec.yaml",
  "packages/codama-renderers-dart/package.json",
]
scopes = [
  "solana_kit",
  "accounts",
  "addresses",
  "codecs",
  "codecs_core",
  "codecs_data_structures",
  "codecs_numbers",
  "codecs_strings",
  "errors",
  "fast_stable_stringify",
  "functional",
  "helius",
  "instruction_plans",
  "instructions",
  "keys",
  "lints",
  "mobile_wallet_adapter",
  "mobile_wallet_adapter_protocol",
  "offchain_messages",
  "options",
  "program_client_core",
  "programs",
  "rpc",
  "rpc_api",
  "rpc_parsed_types",
  "rpc_spec",
  "rpc_spec_types",
  "rpc_subscriptions",
  "rpc_subscriptions_api",
  "rpc_subscriptions_channel_websocket",
  "rpc_transport_http",
  "rpc_transformers",
  "rpc_types",
  "signers",
  "subscribable",
  "sysvars",
  "test_matchers",
  "transaction_confirmation",
  "transaction_messages",
  "transactions",
  "codama_renderers",
]
changelog = "CHANGELOG.md"
extra_changelog_sections = [
  { name = "Notes", types = ["note"] },
  { name = "Documentation", types = ["docs"] },
]

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows.steps]]
type = "Command"
command = "dprint fmt --config dprint.json"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "sync:write"

[[workflows.steps]]
type = "Command"
command = "dprint fmt --config dprint.json"

[[workflows.steps]]
type = "Command"
command = "git add --all"

[[workflows.steps]]
type = "Command"
command = "git commit -m 'chore: prepare release'"

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "forced-release"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "publish"

[[workflows.steps]]
type = "Command"
command = "melos publish --no-dry-run"

[[workflows.steps]]
type = "Command"
command = "pnpm --dir packages/codama-renderers-dart publish"
